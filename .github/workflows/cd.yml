# Funnelier CD Pipeline
# Deploys to staging on push to develop, production on push to master/main
name: CD

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/master' && 'production') || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Determine Environment
  # ──────────────────────────────────────────────
  prepare:
    name: "📋 Prepare Deployment"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # 2. Run CI first (ensure tests pass)
  # ──────────────────────────────────────────────
  ci-gate:
    name: "✅ CI Gate"
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: write

  # ──────────────────────────────────────────────
  # 3. Deploy to Target Environment
  # ──────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to ${{ needs.prepare.outputs.environment }}"
    runs-on: ubuntu-latest
    needs: [prepare, ci-gate]
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url: ${{ needs.prepare.outputs.environment == 'production' && 'https://funnelier.ir' || 'https://staging.funnelier.ir' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set namespace
        run: |
          NAMESPACE="funnelier-${{ needs.prepare.outputs.environment }}"
          echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV

      - name: Create namespace (if needed)
        run: kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes base manifests
        run: |
          kubectl apply -f k8s/base/ -n $NAMESPACE

      - name: Apply environment overlay
        run: |
          ENV=${{ needs.prepare.outputs.environment }}
          if [ -d "k8s/overlays/$ENV" ]; then
            kubectl apply -f k8s/overlays/$ENV/ -n $NAMESPACE
          fi

      - name: Update image tags
        run: |
          TAG=${{ needs.prepare.outputs.image_tag }}
          REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          kubectl set image deployment/funnelier-api \
            api=${REGISTRY}/api:${TAG} -n $NAMESPACE

          kubectl set image deployment/funnelier-frontend \
            frontend=${REGISTRY}/frontend:${TAG} -n $NAMESPACE

          kubectl set image deployment/funnelier-celery-worker \
            celery-worker=${REGISTRY}/api:${TAG} -n $NAMESPACE

          kubectl set image deployment/funnelier-celery-beat \
            celery-beat=${REGISTRY}/api:${TAG} -n $NAMESPACE

      - name: Run database migrations
        run: |
          TAG=${{ needs.prepare.outputs.image_tag }}
          REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          kubectl run funnelier-migrate-${{ github.run_number }} \
            --image=${REGISTRY}/api:${TAG} \
            --restart=Never \
            --rm \
            -i \
            -n $NAMESPACE \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            -- alembic upgrade head

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/funnelier-api -n $NAMESPACE --timeout=300s
          kubectl rollout status deployment/funnelier-frontend -n $NAMESPACE --timeout=300s
          kubectl rollout status deployment/funnelier-celery-worker -n $NAMESPACE --timeout=300s

      - name: Health check
        run: |
          sleep 10
          if [ "${{ needs.prepare.outputs.environment }}" = "production" ]; then
            URL="https://api.funnelier.ir/health"
          else
            URL="https://api.staging.funnelier.ir/health"
          fi
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "::notice::Deployed ${{ needs.prepare.outputs.image_tag }} to ${{ needs.prepare.outputs.environment }}"

  # ──────────────────────────────────────────────
  # 4. Post-deployment smoke test
  # ──────────────────────────────────────────────
  smoke-test:
    name: "💨 Smoke Test"
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          if [ "${{ needs.prepare.outputs.environment }}" = "production" ]; then
            BASE_URL="https://api.funnelier.ir"
          else
            BASE_URL="https://api.staging.funnelier.ir"
          fi

          echo "Testing $BASE_URL..."

          # Health endpoint
          curl -sf "$BASE_URL/health" | jq .
          echo "✅ Health OK"

          # API info
          curl -sf "$BASE_URL/api/v1" | jq .
          echo "✅ API info OK"

          # Auth login (should return 422 without body, not 500)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASE_URL/api/v1/auth/login" \
            -H "Content-Type: application/json" -d '{}')
          if [ "$STATUS" = "422" ]; then
            echo "✅ Auth endpoint responding (422 = validation error, expected)"
          else
            echo "⚠️ Auth returned $STATUS"
          fi

          echo "🎉 Smoke tests passed!"

