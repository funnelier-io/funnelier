# Funnelier CI Pipeline
# Runs on every push/PR: lint, test, build, security scan
name: CI

on:
  push:
    branches: [master, main, develop, "release/**"]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Backend Lint & Type Check
  # ──────────────────────────────────────────────
  backend-lint:
    name: "🔍 Backend Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/

  # ──────────────────────────────────────────────
  # 2. Frontend Lint & Type Check
  # ──────────────────────────────────────────────
  frontend-lint:
    name: "🔍 Frontend Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . || true

      - name: TypeScript check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # 3. Backend Unit Tests
  # ──────────────────────────────────────────────
  backend-unit-tests:
    name: "🧪 Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing \
            -q --no-header
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:///test.db"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage.xml

  # ──────────────────────────────────────────────
  # 4. Backend Integration Tests
  # ──────────────────────────────────────────────
  backend-integration-tests:
    name: "🧪 Backend Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: funnelier_test
          POSTGRES_PASSWORD: funnelier_test
          POSTGRES_DB: funnelier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U funnelier_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://funnelier_test:funnelier_test@localhost:5432/funnelier_test"

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing \
            -q --no-header
        env:
          ENV: test
          DATABASE_URL: "postgresql+asyncpg://funnelier_test:funnelier_test@localhost:5432/funnelier_test"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/1"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage.xml

  # ──────────────────────────────────────────────
  # 5. Frontend Build
  # ──────────────────────────────────────────────
  frontend-build:
    name: "🏗️ Frontend Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 1

  # ──────────────────────────────────────────────
  # 6. E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-build]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: funnelier_test
          POSTGRES_PASSWORD: funnelier_test
          POSTGRES_DB: funnelier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U funnelier_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://funnelier_test:funnelier_test@localhost:5432/funnelier_test"

      - name: Start backend
        run: |
          uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
        env:
          ENV: test
          DATABASE_URL: "postgresql+asyncpg://funnelier_test:funnelier_test@localhost:5432/funnelier_test"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        working-directory: frontend
        run: |
          npm start -- -p 3000 &
          sleep 5
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=html
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 7. Security Scan
  # ──────────────────────────────────────────────
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pip-audit safety

      - name: pip-audit
        run: pip-audit --strict --desc || true
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ──────────────────────────────────────────────
  # 8. Build & Push Docker Images
  # ──────────────────────────────────────────────
  docker-build:
    name: "🐳 Build Docker Images"
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL || 'https://api.funnelier.ir' }}

      - name: Image digest
        run: |
          echo "Backend: ${{ steps.meta-backend.outputs.tags }}"
          echo "Frontend: ${{ steps.meta-frontend.outputs.tags }}"

