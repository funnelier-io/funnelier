# Funnelier API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: funnelier-api
  labels:
    app.kubernetes.io/name: funnelier-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: funnelier
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: funnelier-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: funnelier-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: funnelier
    spec:
      serviceAccountName: funnelier-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/OWNER/funnelier/api:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: funnelier-config
            - secretRef:
                name: funnelier-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Startup probe — gives the app 60s to start
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          # Liveness probe — restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe — remove from LB if not ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /tmp/funnelier/uploads
      volumes:
        - name: uploads
          emptyDir:
            sizeLimit: 1Gi

---
# Funnelier API Service
apiVersion: v1
kind: Service
metadata:
  name: funnelier-api
  labels:
    app.kubernetes.io/name: funnelier-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: funnelier
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: funnelier-api

