spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: funnelier-celery-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

