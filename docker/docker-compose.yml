services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: funnelier-postgres
    environment:
      POSTGRES_USER: funnelier
      POSTGRES_PASSWORD: funnelier
      POSTGRES_DB: funnelier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funnelier"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: funnelier-redis
    ports:
      - "6384:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB (for tenant data sources)
  mongodb:
    image: mongo:6
    container_name: funnelier-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: funnelier
      MONGO_INITDB_ROOT_PASSWORD: funnelier
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27019:27017"

  # Backend API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-api
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MONGODB_URL=mongodb://funnelier:funnelier@mongodb:27017
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro
      - upload_data:/app/uploads
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-celery-worker
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro
    command: celery -A src.infrastructure.messaging.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-celery-beat
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - celery-worker
    volumes:
      - ../src:/app/src:ro
    command: celery -A src.infrastructure.messaging.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  upload_data:

