services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: funnelier-postgres
    environment:
      POSTGRES_USER: funnelier
      POSTGRES_PASSWORD: funnelier
      POSTGRES_DB: funnelier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funnelier"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: funnelier-redis
    ports:
      - "6384:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB (for tenant data sources)
  mongodb:
    image: mongo:6
    container_name: funnelier-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: funnelier
      MONGO_INITDB_ROOT_PASSWORD: funnelier
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27019:27017"

  # Backend API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-api
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MONGODB_URL=mongodb://funnelier:funnelier@mongodb:27017
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro
      - upload_data:/app/uploads
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-celery-worker
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro
    command: celery -A src.infrastructure.messaging.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: funnelier-celery-beat
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://funnelier:funnelier@postgres:5432/funnelier
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - celery-worker
    volumes:
      - ../src:/app/src:ro
    command: celery -A src.infrastructure.messaging.celery_app beat --loglevel=info

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://api:8000
    container_name: funnelier-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Camunda 7 BPMS (workflow engine)
  camunda:
    image: camunda/camunda-bpm-platform:7.21.0
    container_name: funnelier-camunda
    ports:
      - "8085:8080"
    environment:
      - DB_DRIVER=org.h2.Driver
      - DB_URL=jdbc:h2:./camunda-h2-default/process-engine;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - DB_USERNAME=sa
      - DB_PASSWORD=sa
      - WAIT_FOR_TIMEOUT=30
    volumes:
      - camunda_data:/camunda/camunda-h2-default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/engine-rest/engine"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  upload_data:
  camunda_data:

